name: Feature
description: Groesseres Orga-Vorhaben fuer Doku, Workflow oder Teamstruktur
title: "[Feature] "
labels:
  - type:feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Bedarf
      description: Welches Problem oder welcher Bedarf steckt dahinter?
      placeholder: Ausgangslage und Motivation beschreiben.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Vorschlag
      description: Was soll umgesetzt oder aufgebaut werden?
      placeholder: Zielbild, Loesungsansatz oder Umfang.
    validations:
      required: true
  - type: textarea
    id: slices
    attributes:
      label: Moegliche Arbeitspakete
      description: In welche kleineren Tasks kann das Feature zerlegt werden?
