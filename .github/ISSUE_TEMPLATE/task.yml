name: Task
description: Konkretes Orga-Arbeitspaket fuer dieses Repo
title: "[Task] "
labels:
  - type:task
body:
  - type: textarea
    id: goal
    attributes:
      label: Ziel
      description: Was soll konkret im Orga-Repo erledigt werden?
      placeholder: Das Arbeitspaket in 1 bis 3 Saetzen beschreiben.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Ergebnis
      description: Woran erkennen wir, dass die Aufgabe fertig ist?
      placeholder: Akzeptanzkriterien oder erwartetes Ergebnis.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Hinweise
      description: Abhaengigkeiten, Risiken oder offene Fragen.
